# Render Blueprint for SPeEdtracQR — FREE TIER version.
#
# Render's free tier only covers a Web Service + Postgres. Background Workers,
# Cron Jobs, and Persistent Disks all require payment, so this file folds their
# jobs into the single free web service. Tradeoffs (see DEPLOYMENT_RENDER.md):
#   - QUEUE_CONNECTION=sync  -> jobs run inline in the request (no worker needed)
#   - No scheduler service   -> SLA emails need an external free cron (cron-job.org)
#   - No disk                -> uploaded files/QR are LOST on redeploy unless you
#                               point FILESYSTEM_DISK at free S3 storage (R2/Supabase)

# Using an EXTERNAL Supabase Postgres instead of a Render database, so there is
# no `databases:` block here. Paste the Supabase connection string into DB_URL
# in the Render dashboard (see below). Use the SESSION POOLER string (IPv4).

services:
  - type: web
    name: speedtraqr-web
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # sleeps after 15 min idle; cold start ~30s
    healthCheckPath: /login
    envVars:
      - key: APP_KEY
        sync: false              # paste `php artisan key:generate --show`
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false              # https://speedtraqr-web.onrender.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        sync: false              # paste Supabase "Session pooler" connection string
      - key: DB_SSLMODE
        value: require           # Supabase requires SSL
      - key: SESSION_DRIVER
        value: database
      - key: QUEUE_CONNECTION
        value: sync              # no worker -> run jobs inline
      - key: CACHE_STORE
        value: database
      - key: FILESYSTEM_DISK
        value: local             # ephemeral; switch to s3 to persist files
      - key: BROADCAST_CONNECTION
        value: log
      - key: AI_PROVIDER
        value: none
      - key: LOG_CHANNEL
        value: stderr
      - key: MAIL_MAILER
        value: log               # swap to smtp once you have a mail provider
